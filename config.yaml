# config.yaml

# 1. 生成参数
generation:
  model: "deepseek-ai/DeepSeek-R1"         # 已替换为 Qwen3 旗舰思考模型
  base_url: "https://api.siliconflow.cn/v1"           # API 请求地址
  max_concurrency: 3               # 🔥 注意：因为切换到了网络 API 且模型极大，建议先将并发降到 10-20，避免触发 429 Rate Limit
  max_retries: 3                     # 单个任务失败重试次数

# 2. 文件路径 (建议也配置在这里)
file_paths:
  output_file: "data/st_dataset_local.jsonl"
  dpo_file: "data/st_dpo_dataset.jsonl"
  golden_file: "data/golden_prompts.json"
  history_file: "data/history.jsonl"

# 3. 任务目标
project:
  target_count: 200000               # 目标生成总数